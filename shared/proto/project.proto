// /shared/proto/project.proto

syntax = "proto3";

package project;

option go_package = "gateway/pkg/pb";

service ProjectService {
  // Returns the full catalogue of all available projects (public, no auth needed)
  rpc GetAllProjects (GetAllProjectsRequest) returns (GetAllProjectsResponse);

  // Returns a single project by its id
  rpc GetProjectById (GetProjectByIdRequest) returns (GetProjectByIdResponse);

  // Returns a project with all its learning phases
  rpc GetProjectWithPhases (GetProjectWithPhasesRequest) returns (GetProjectWithPhasesResponse);
}

message GetAllProjectsRequest {}

message GetAllProjectsResponse {
  repeated Project projects = 1;
}

message GetProjectByIdRequest {
  string project_id = 1;
}

message GetProjectByIdResponse {
  Project project = 1;
}

message Project {
  string id                  = 1;
  string name                = 2;
  repeated string tech_stack = 3;
  string skill_level         = 4;
  int32  estimated_minutes   = 5;
  int32  phase_count         = 6;
  string goal                = 7;
  string demo_url            = 8;
  repeated string deliverables = 9;
  // JSON-encoded array of { filePath, content, isDirectory } entries
  // representing the project's initial file structure. Empty string means use defaults.
  string initial_files       = 10;
}

message LearningPhaseProto {
  string id                = 1;
  string title             = 2;
  string description       = 3;
  string goal              = 4;  // JSON-encoded string
  int32  phase_number      = 5;
  int32  estimated_minutes = 6;
  string long_description  = 7;
}

message GetProjectWithPhasesRequest {
  string project_id = 1;
  string email      = 2;  // optional – when provided, locked/already_started are computed
}

message GetProjectWithPhasesResponse {
  Project                      project         = 1;
  repeated LearningPhaseProto  phases          = 2;
  bool                         locked          = 3;  // true when user has another in_progress project
  bool                         already_started = 4;  // true when user already owns this project
}
