// /shared/proto/user.proto

syntax = "proto3";

package user;

option go_package = "gateway/internal/pb";

service UserService {
  rpc CreateUser (CreateUserRequest) returns (UserResponse);
}
message CreateUserRequest {
  string email = 1;
  string password = 2;
}

message UserResponse {
  string id = 1;
  bool success = 2;
}