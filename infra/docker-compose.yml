services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data_2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
